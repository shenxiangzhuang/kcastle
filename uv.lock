version = 1
revision = 3
requires-python = ">=3.10.11"

[manifest]
members = [
    "kagent",
    "kai",
    "kcode",
]

[[package]]
name = "kagent"
version = "0.1.0"
source = { editable = "packages/kagent" }
dependencies = [
    { name = "kai" },
]

[package.metadata]
requires-dist = [{ name = "kai", editable = "packages/kai" }]

[[package]]
name = "kai"
version = "0.1.0"
source = { editable = "packages/kai" }

[[package]]
name = "kcode"
version = "0.1.0"
source = { editable = "packages/kcode" }
dependencies = [
    { name = "kagent" },
]

[package.metadata]
requires-dist = [{ name = "kagent", editable = "packages/kagent" }]
