[project]
name = "kcastle-ai"
version = "0.0.1a2"
description = "AI provider abstractions for the k agent framework"
readme = "README.md"
authors = [
    { name = "Xiangzhuang Shen", email = "datahonor@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.11.7",
    "openai>=1.93.3",
    "anthropic>=0.55.0",
]

[dependency-groups]
dev = [
    "pyright>=1.1.407",
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "rich>=14.0.0",
    "ruff>=0.14.10",
]

[build-system]
requires = ["uv_build>=0.9.18,<0.10.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = ["kai"]
source-exclude = ["tests/**/*"]

[tool.ruff]
line-length = 100

[tool.ruff.format]
docstring-code-format = true

[tool.ruff.lint]
select = [
    "E",   # pycodestyle
    "F",   # Pyflakes
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
    "I",   # isort
]

[tool.pyright]
typeCheckingMode = "strict"
pythonVersion = "3.12"
reportUnnecessaryTypeIgnoreComment = "warning"
include = [
    "src/**/*.py",
    "tests/**/*.py",
    "examples/**/*.py",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
