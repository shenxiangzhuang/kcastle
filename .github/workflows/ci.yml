name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up environment
        uses: ./.github/actions/setup-python-env

      - name: Ruff check
        run: uv run ruff check

      - name: Ruff format check
        run: uv run ruff format --check

  type-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up environment
        uses: ./.github/actions/setup-python-env

      - name: Pyright
        run: uv run pyright

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
      fail-fast: false
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: uv run pytest

  build:
    runs-on: ubuntu-latest
    needs: [quality, type-check, test]
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up environment
        uses: ./.github/actions/setup-python-env

      - name: Build kcastle-ai
        run: uv build --package kcastle-ai --no-sources --out-dir dist/kcastle-ai

      - name: Build kcastle-agent
        run: uv build --package kcastle-agent --no-sources --out-dir dist/kcastle-agent

      - name: Build kcastle
        run: uv build --package kcastle --no-sources --out-dir dist/kcastle

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
